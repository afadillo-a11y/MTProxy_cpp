name: build-openwrt-aarch64-musl

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TARGET_TRIPLE: aarch64-linux-musl
      ZIG_VERSION: 0.13.0
      ZLIB_VERSION: 1.3.2
      OPENSSL_VERSION: 3.0.19

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            file \
            perl \
            pkg-config \
            python3 \
            qemu-user \
            tar \
            xz-utils

      - name: Install Zig
        run: |
          curl -fL --retry 5 --retry-delay 3 \
            -o zig.tar.xz \
            https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar -xf zig.tar.xz
          echo "${GITHUB_WORKSPACE}/zig-linux-x86_64-${ZIG_VERSION}" >> "${GITHUB_PATH}"

      - name: Show tool versions
        run: |
          zig version
          cc --version || true
          perl -v | head -n 2

      - name: Build zlib (static)
        run: |
          curl -fL --retry 5 --retry-delay 3 \
            -o zlib.tar.gz \
            https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz
          tar -xzf zlib.tar.gz
          cd zlib-${ZLIB_VERSION}

          export CC="zig cc -target ${TARGET_TRIPLE}"
          export AR="zig ar"
          export RANLIB="zig ranlib"

          CHOST=${TARGET_TRIPLE} ./configure --static --prefix="${GITHUB_WORKSPACE}/deps"
          make -j"$(nproc)"
          make install

          test -f "${GITHUB_WORKSPACE}/deps/lib/libz.a"

      - name: Build OpenSSL (static)
        run: |
          curl -fL --retry 5 --retry-delay 3 \
            -o openssl.tar.gz \
            https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz
          tar -xzf openssl.tar.gz
          cd openssl-${OPENSSL_VERSION}

          export CC="zig cc -target ${TARGET_TRIPLE}"
          export AR="zig ar"
          export RANLIB="zig ranlib"

          ./Configure linux-aarch64 \
            no-shared \
            no-module \
            no-dso \
            no-tests \
            --prefix="${GITHUB_WORKSPACE}/deps"

          make -j"$(nproc)"
          make install_sw

          test -f "${GITHUB_WORKSPACE}/deps/lib/libcrypto.a"

      - name: Patch Makefile for cross-build
        shell: bash
        run: |
          cp Makefile Makefile.orig

          python3 - <<'PY'
          from pathlib import Path
          p = Path("Makefile")
          s = p.read_text()

          s = s.replace("HOST_ARCH := $(shell arch)", "HOST_ARCH ?= aarch64")
          s = s.replace("LDFLAGS := $(COMMON_LDFLAGS)", "LDFLAGS ?= $(COMMON_LDFLAGS)")
          s = s.replace("CFLAGS := $(COMMON_CFLAGS) $(BITNESS_FLAGS)", "CFLAGS ?= $(COMMON_CFLAGS) $(BITNESS_FLAGS)")

          p.write_text(s)
          PY

          echo "===== Makefile diff ====="
          diff -u Makefile.orig Makefile || true

      - name: Patch sources for aarch64 + musl
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def sub_or_die(path_str, pattern, repl, flags=0, count=0):
            p = Path(path_str)
            s = p.read_text()
            ns, n = re.subn(pattern, repl, s, flags=flags, count=count)
            if n == 0:
              raise SystemExit(f"patch failed: {path_str}: pattern not found: {pattern}")
            p.write_text(ns)

          def replace_or_die(path_str, old, new, count=-1):
            p = Path(path_str)
            s = p.read_text()
            n = s.count(old)
            if n == 0:
              raise SystemExit(f"patch failed: {path_str}: text not found: {old[:80]!r}")
            if count >= 0 and n < count:
              raise SystemExit(f"patch failed: {path_str}: expected >= {count}, got {n}")
            p.write_text(s.replace(old, new))

          # 1) engine/engine-rpc.h: x86intrin only on x86
          sub_or_die(
            "engine/engine-rpc.h",
            r'#include <x86intrin\.h>',
            '#if defined(__i386__) || defined(__x86_64__)\n#include <x86intrin.h>\n#endif'
          )

          # 2) common/precise-time.h: rdtsc fallback for non-x86
          p = Path("common/precise-time.h")
          s = p.read_text()
          if "CLOCK_MONOTONIC_RAW" not in s:
            marker = "#endif\n\n/* net-event.h */"
            repl = (
              "#else\n"
              "static __inline__ unsigned long long rdtsc(void) {\n"
              "  struct timespec ts;\n"
              "  clock_gettime(CLOCK_MONOTONIC_RAW, &ts);\n"
              "  return (unsigned long long)ts.tv_sec * 1000000000ull + (unsigned long long)ts.tv_nsec;\n"
              "}\n"
              "#endif\n\n/* net-event.h */"
            )
            if marker not in s:
              raise SystemExit("patch failed: common/precise-time.h marker not found")
            s = s.replace(marker, repl, 1)
            p.write_text(s)

          # 3) common/server-functions.h: mfence fallback for non-x86
          p = Path("common/server-functions.h")
          s = p.read_text()
          old = '''static inline void mfence (void) {
            asm volatile ("mfence": : :"memory");
          }'''
          new = '''static inline void mfence (void) {
          #if defined(__i386__) || defined(__x86_64__)
            asm volatile ("mfence": : :"memory");
          #else
            __sync_synchronize();
          #endif
          }'''
          if old in s:
            s = s.replace(old, new, 1)
            p.write_text(s)

          # 4) jobs/jobs.h: musl-compatible RNG state
          replace_or_die(
            "jobs/jobs.h",
            "  struct drand48_data rand_data;",
            "  unsigned short rand_data[3];"
          )

          # 5) jobs/jobs.c: replace glibc *_r RNG API with xsubi[3] family
          p = Path("jobs/jobs.c")
          s = p.read_text()
          for old, new in [
            (
              "    long int t;\n    lrand48_r (&this_job_thread->rand_data, &t);\n    return t;",
              "    return nrand48 (this_job_thread->rand_data);"
            ),
            (
              "    long int t;\n    mrand48_r (&this_job_thread->rand_data, &t);\n    return t;",
              "    return jrand48 (this_job_thread->rand_data);"
            ),
            (
              "    double t;\n    drand48_r (&this_job_thread->rand_data, &t);\n    return t;",
              "    return erand48 (this_job_thread->rand_data);"
            ),
            (
              "  srand48_r (rdtsc () ^ lrand48 (), &JT->rand_data);",
              "  {\n"
              "    unsigned long long seed = (unsigned long long)rdtsc() ^ (unsigned long long)lrand48();\n"
              "    JT->rand_data[0] = (unsigned short)(seed & 0xffffu);\n"
              "    JT->rand_data[1] = (unsigned short)((seed >> 16) & 0xffffu);\n"
              "    JT->rand_data[2] = (unsigned short)((seed >> 32) & 0xffffu);\n"
              "  }"
            ),
          ]:
            if old not in s:
              raise SystemExit(f"patch failed: jobs/jobs.c text not found: {old[:80]!r}")
            s = s.replace(old, new, 1)
          p.write_text(s)

          # 6) common/cpuid.c: stub on non-x86
          p = Path("common/cpuid.c")
          s = p.read_text()
          if "#include <cpuid.h>" in s:
            s = s.replace(
              '#include <cpuid.h>\n\n#include "cpuid.h"\n',
              '#if defined(__i386__) || defined(__x86_64__)\n#include <cpuid.h>\n#endif\n\n#include "cpuid.h"\n',
              1
            )

          s = re.sub(
            r'kdb_cpuid_t \*kdb_cpuid \(void\) \{.*?\n\}',
            '''kdb_cpuid_t *kdb_cpuid (void) {
          #if defined(__i386__) || defined(__x86_64__)
            static kdb_cpuid_t cached = { .magic = 0 };
            if (cached.magic) {
              assert (cached.magic == CPUID_MAGIC);
              return &cached;
            }

            unsigned int a;
            assert(
              __get_cpuid(1,
                  &a,
                  (unsigned int*) &cached.ebx,
                  (unsigned int*) &cached.ecx,
                  (unsigned int*) &cached.edx
              ) != 0
            );

            cached.magic = CPUID_MAGIC;
            return &cached;
          #else
            static kdb_cpuid_t cached = { .magic = CPUID_MAGIC, .ebx = 0, .ecx = 0, .edx = 0 };
            return &cached;
          #endif
          }''',
            s,
            flags=re.S,
            count=1
          )
          p.write_text(s)

          # 7) common/crc32c.c: do not use x86 intrinsics/asm on aarch64
          p = Path("common/crc32c.c")
          s = p.read_text()

          s = s.replace(
            "#include <wmmintrin.h>",
            "#if defined(__i386__) || defined(__x86_64__)\n#include <wmmintrin.h>\n#endif",
            1
          )

          s = s.replace("#ifdef __LP64__", "#if defined(__x86_64__)", 1)
          s = s.replace(
            "\n#else\nstatic unsigned crc32c_partial_sse42 (const void *data, long len, unsigned crc) {",
            "\n#elif defined(__i386__)\nstatic unsigned crc32c_partial_sse42 (const void *data, long len, unsigned crc) {",
            1
          )

          s = re.sub(
            r'void crc32c_init \(void\) \{.*?\n\}',
            '''void crc32c_init (void) {
            compute_crc32c_combine = &crc32c_combine_generic;
          #if defined(__i386__) || defined(__x86_64__)
            kdb_cpuid_t *p = kdb_cpuid ();
            if (p->ecx & (1 << 20)) {
              crc32c_partial = crc32c_partial_sse42;
            #ifdef __x86_64__
              if (p->ecx & 2) {
                crc32c_partial = crc32c_partial_sse42_clmul;
                compute_crc32c_combine = &crc32c_combine_clmul;
              }
            #endif
            } else {
              crc32c_partial = &crc32c_partial_four_tables;
            }
          #else
            crc32c_partial = &crc32c_partial_four_tables;
          #endif
          }''',
            s,
            flags=re.S,
            count=1
          )
          p.write_text(s)
          PY

          echo "===== grep after patch ====="
          grep -RIn "x86intrin.h\|wmmintrin.h\|drand48_data\|srand48_r\|lrand48_r\|mrand48_r\|drand48_r\|__get_cpuid" engine jobs common || true

      - name: Build MTProxy (static musl)
        shell: bash
        run: |
          make clean || true

          export HOST_ARCH=aarch64
          export CC="zig cc -target ${TARGET_TRIPLE}"
          export CXX="zig c++ -target ${TARGET_TRIPLE}"
          export AR="zig ar"
          export RANLIB="zig ranlib"

          export CFLAGS="-O2 -pipe -static \
            -I${GITHUB_WORKSPACE}/deps/include \
            -fno-strict-aliasing -fno-strict-overflow -fwrapv \
            -DAES=1 -D_GNU_SOURCE=1 -D_FILE_OFFSET_BITS=64 \
            -Wno-array-bounds -Wno-implicit-function-declaration"

          export LDFLAGS="-static \
            -L${GITHUB_WORKSPACE}/deps/lib \
            -L${GITHUB_WORKSPACE}/deps/lib64 \
            -Wl,--start-group -lcrypto -lz -lpthread -lm -lrt -Wl,--end-group"

          echo "HOST_ARCH=${HOST_ARCH}"
          echo "CC=${CC}"
          echo "CFLAGS=${CFLAGS}"
          echo "LDFLAGS=${LDFLAGS}"

          make V=1 2>&1 | tee build.log

      - name: Inspect binary
        if: always()
        shell: bash
        run: |
          set -x
          ls -lah objs/bin || true
          file objs/bin/mtproto-proxy || true
          readelf -h objs/bin/mtproto-proxy || true
          readelf -d objs/bin/mtproto-proxy || true
          strings objs/bin/mtproto-proxy | grep -Ei 'musl|glibc|openssl|zlib' | head -n 50 || true

      - name: Smoke test under qemu
        if: always()
        shell: bash
        run: |
          qemu-aarch64 ./objs/bin/mtproto-proxy --help | head -n 60 || true

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-aarch64-musl
          path: objs/bin/mtproto-proxy

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-build-debug
          path: |
            build.log
            Makefile
            Makefile.orig
            deps/lib/libz.a
            deps/lib/libcrypto.a
