name: build-MTProxy-openwrt-aarch64-musl

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TARGET_TRIPLE: aarch64-linux-musl
      ZIG_VERSION: 0.13.0
      ZLIB_VERSION: 1.3.2
      OPENSSL_VERSION: 3.0.19

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install host tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            file \
            perl \
            pkg-config \
            python3 \
            qemu-user \
            tar \
            xz-utils

      - name: Install Zig
        shell: bash
        run: |
          set -euxo pipefail
          curl -fL --retry 5 --retry-delay 3 \
            -o zig.tar.xz \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "${GITHUB_WORKSPACE}/zig-linux-x86_64-${ZIG_VERSION}" >> "${GITHUB_PATH}"

      - name: Show tool versions
        shell: bash
        run: |
          set -euxo pipefail
          zig version
          cc --version || true
          perl -v | head -n 2

      - name: Build zlib (static)
        shell: bash
        run: |
          set -euxo pipefail

          curl -fL --retry 5 --retry-delay 3 \
            -o zlib.tar.gz \
            "https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz"
          tar -xzf zlib.tar.gz
          cd "zlib-${ZLIB_VERSION}"

          export CC="zig cc -target ${TARGET_TRIPLE}"
          export AR="zig ar"
          export RANLIB="zig ranlib"

          CHOST="${TARGET_TRIPLE}" ./configure --static --prefix="${GITHUB_WORKSPACE}/deps"
          make -j"$(nproc)"
          make install

          test -f "${GITHUB_WORKSPACE}/deps/lib/libz.a"

      - name: Build OpenSSL (static)
        shell: bash
        run: |
          set -euxo pipefail

          curl -fL --retry 5 --retry-delay 3 \
            -o openssl.tar.gz \
            "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          tar -xzf openssl.tar.gz
          cd "openssl-${OPENSSL_VERSION}"

          export CC="zig cc -target ${TARGET_TRIPLE}"
          export AR="zig ar"
          export RANLIB="zig ranlib"

          ./Configure linux-aarch64 \
            no-shared \
            no-module \
            no-dso \
            no-tests \
            --prefix="${GITHUB_WORKSPACE}/deps"

          make -j"$(nproc)"
          make install_sw

          test -f "${GITHUB_WORKSPACE}/deps/lib/libcrypto.a"

      - name: Patch Makefile for cross-build
        shell: bash
        run: |
          set -euxo pipefail

          sed -i 's/VERSION :=.*/VERSION := v3.0.12/g' Makefile || true
          sed -i 's/COMMIT :=.*/COMMIT := v3.0.12/g' Makefile || true
          cp Makefile Makefile.orig

          python3 - <<'PY'
          from pathlib import Path

          p = Path("Makefile")
          if not p.exists():
              raise SystemExit("Makefile not found")

          s = p.read_text()

          s = s.replace("HOST_ARCH := $(shell arch)", "HOST_ARCH ?= aarch64")
          s = s.replace("LDFLAGS := $(COMMON_LDFLAGS)", "LDFLAGS ?= $(COMMON_LDFLAGS)")
          s = s.replace("CFLAGS := $(COMMON_CFLAGS) $(BITNESS_FLAGS)", "CFLAGS ?= $(COMMON_CFLAGS) $(BITNESS_FLAGS)")
          s = s.replace("CXXFLAGS := $(COMMON_CFLAGS) $(BITNESS_FLAGS)", "CXXFLAGS ?= $(COMMON_CFLAGS) $(BITNESS_FLAGS)")

          p.write_text(s)
          PY

      - name: Patch sources for aarch64 + musl
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import re
          from pathlib import Path

          def patch_text(path, fn):
              p = Path(path)
              if not p.exists():
                  return
              old = p.read_text(encoding="utf-8")
              new = fn(old)
              p.write_text(new, encoding="utf-8")

          def replace_func(src: str, func_name: str, replacement: str) -> str:
              idx = src.find(func_name)
              if idx == -1:
                  return src

              start = src.rfind('\n', 0, idx)
              if start == -1:
                  start = 0
              else:
                  start += 1

              brace = src.find('{', idx)
              if brace == -1:
                  return src

              depth = 0
              end = -1
              for i in range(brace, len(src)):
                  if src[i] == '{':
                      depth += 1
                  elif src[i] == '}':
                      depth -= 1
                      if depth == 0:
                          end = i + 1
                          break
              if end == -1:
                  return src

              return src[:start] + replacement.rstrip() + "\n\n" + src[end:]

          def patch_server_functions(s: str) -> str:
              s = re.sub(r'^\s*#include\s*<execinfo\.h>\s*$', '', s, flags=re.M)
              s = replace_func(
                  s,
                  "print_backtrace(",
                  "void print_backtrace(void) {\n}\n"
              )
              s = replace_func(
                  s,
                  "get_version_string(",
                  'const char *get_version_string(void) {\n  return "mtproxy-v3.0.12";\n}\n'
              )
              return s

          def patch_mtproto_banner(s: str) -> str:
              return re.sub(
                  r'printf\s*\(\s*"%s compiled at.*?COMMIT\s*\);',
                  'printf ("%s (v3.0.12) compiled at %s %s\\n", progname, __DATE__, __TIME__);',
                  s,
                  flags=re.S
              )

          def patch_engine_banner(s: str) -> str:
              return re.sub(
                  r'vkprintf\s*\(\s*0\s*,\s*"Invoking engine.*?COMMIT\s*\);',
                  'vkprintf (0, "Invoking engine %s (v3.0.12) compiled at %s %s\\n", progname, __DATE__, __TIME__);',
                  s,
                  flags=re.S
              )

          def patch_precise_time_h(s: str) -> str:
              if "CLOCK_MONOTONIC_RAW" in s and "__rdtsc rdtsc" in s:
                  return s
              s = re.sub(
                  r'#include\s+<x86intrin\.h>',
                  '#if defined(__i386__) || defined(__x86_64__)\n#include <x86intrin.h>\n#else\n#include <time.h>\nstatic __inline__ unsigned long long __rdtsc(void) {\n  struct timespec ts;\n  clock_gettime(CLOCK_MONOTONIC_RAW, &ts);\n  return (unsigned long long)ts.tv_sec * 1000000000ull + (unsigned long long)ts.tv_nsec;\n}\n#endif',
                  s
              )
              return s

          def patch_server_functions_h(s: str) -> str:
              return re.sub(
                  r'static\s+inline\s+void\s+mfence\s*\(\s*void\s*\)\s*\{\s*asm\s+volatile\s*\(\s*"mfence"\s*:\s*:\s*:"memory"\s*\);\s*\}',
                  'static inline void mfence (void) {\n#if defined(__i386__) || defined(__x86_64__)\n  asm volatile ("mfence": : : "memory");\n#else\n  __sync_synchronize();\n#endif\n}',
                  s,
                  flags=re.S
              )

          def patch_engine_rpc_h(s: str) -> str:
              return re.sub(
                  r'#include\s+<x86intrin\.h>',
                  '#if defined(__i386__) || defined(__x86_64__)\n#include <x86intrin.h>\n#else\n#include "common/precise-time.h"\n#endif',
                  s
              )

          def patch_jobs_h(s: str) -> str:
              return s.replace('struct drand48_data rand_data;', 'unsigned short rand_data[3];')

          def patch_jobs_c(s: str) -> str:
              s = re.sub(r'lrand48_r\s*\([^,]+,\s*&t\)\s*;', 'return nrand48(this_job_thread->rand_data);', s)
              s = re.sub(r'mrand48_r\s*\([^,]+,\s*&t\)\s*;', 'return jrand48(this_job_thread->rand_data);', s)
              s = re.sub(r'drand48_r\s*\([^,]+,\s*&t\)\s*;', 'return erand48(this_job_thread->rand_data);', s)
              s = re.sub(
                  r'srand48_r\s*\([^;]+;',
                  '{\n  unsigned long long seed = (unsigned long long)__rdtsc() ^ (unsigned long long)lrand48();\n  JT->rand_data[0] = (unsigned short)(seed & 0xffffu);\n  JT->rand_data[1] = (unsigned short)((seed >> 16) & 0xffffu);\n  JT->rand_data[2] = (unsigned short)((seed >> 32) & 0xffffu);\n}',
                  s
              )
              return s

          def patch_cpuid_c(s: str) -> str:
              s = re.sub(
                  r'#include\s+<cpuid\.h>',
                  '#if defined(__i386__) || defined(__x86_64__)\n#include <cpuid.h>\n#endif',
                  s
              )
              s = replace_func(
                  s,
                  "kdb_cpuid(",
                  '''kdb_cpuid_t *kdb_cpuid (void) {
          #if defined(__i386__) || defined(__x86_64__)
            static kdb_cpuid_t cached = { .magic = 0 };
            if (cached.magic) {
              return &cached;
            }
            unsigned int a = 0, b = 0, c = 0, d = 0;
            __get_cpuid(1, &a, &b, &c, &d);
            cached.ebx = (int)b;
            cached.ecx = (int)c;
            cached.edx = (int)d;
            cached.magic = 0x280147b8;
            return &cached;
          #else
            static kdb_cpuid_t cached = { .magic = 0x280147b8, .ebx = 0, .ecx = 0, .edx = 0 };
            return &cached;
          #endif
          }'''
              )
              return s

          def patch_crc32(s: str) -> str:
              s = re.sub(
                  r'#ifdef\s+__LP64__',
                  '#if defined(__x86_64__)',
                  s
              )

              if '#include <wmmintrin.h>' in s and '#if defined(__i386__) || defined(__x86_64__)\n#include <wmmintrin.h>\n#endif' not in s:
                  s = s.replace(
                      '#include <wmmintrin.h>',
                      '#if defined(__i386__) || defined(__x86_64__)\n#include <wmmintrin.h>'
                  )
                  marker = 'void crc32_init'
                  pos = s.find(marker)
                  if pos != -1:
                      s = s[:pos] + '#endif\n\n' + s[pos:]

              s = replace_func(
                  s,
                  'crc32_init(',
                  '''void crc32_init (void) {
          #if defined(__i386__) || defined(__x86_64__)
            kdb_cpuid_t *p = kdb_cpuid ();
            if (p->ecx & 2) {
              crc32_partial = crc32_partial_clmul;
              crc64_partial = crc64_partial_clmul;
              compute_crc32_combine = compute_crc32_combine_clmul;
              compute_crc64_combine = compute_crc64_combine_clmul;
            } else {
              crc32_partial = crc32_partial_generic;
              crc64_partial = crc64_partial_one_table;
              compute_crc32_combine = compute_crc32_combine_generic;
              compute_crc64_combine = compute_crc64_combine_generic;
            }
          #else
            crc32_partial = crc32_partial_generic;
            crc64_partial = crc64_partial_one_table;
            compute_crc32_combine = compute_crc32_combine_generic;
            compute_crc64_combine = compute_crc64_combine_generic;
          #endif
          }'''
              )
              return s

          def patch_crc32c(s: str) -> str:
              s = re.sub(
                  r'#ifdef\s+__LP64__',
                  '#if defined(__x86_64__)',
                  s
              )
              s = re.sub(
                  r'#else\s*static\s+unsigned\s+crc32c_partial_sse42',
                  '#elif defined(__i386__)\nstatic unsigned crc32c_partial_sse42',
                  s,
                  flags=re.S
              )

              if '#include <wmmintrin.h>' in s and '#if defined(__i386__) || defined(__x86_64__)\n#include <wmmintrin.h>\n#endif' not in s:
                  s = s.replace(
                      '#include <wmmintrin.h>',
                      '#if defined(__i386__) || defined(__x86_64__)\n#include <wmmintrin.h>'
                  )
                  marker = 'void crc32c_init'
                  pos = s.find(marker)
                  if pos != -1:
                      s = s[:pos] + '#endif\n\n' + s[pos:]

              s = replace_func(
                  s,
                  'crc32c_init(',
                  '''void crc32c_init (void) {
            compute_crc32c_combine = &crc32c_combine_generic;
          #if defined(__i386__) || defined(__x86_64__)
            kdb_cpuid_t *p = kdb_cpuid ();
            if (p->ecx & (1 << 20)) {
              crc32c_partial = crc32c_partial_sse42;
            #ifdef __x86_64__
              if (p->ecx & 2) {
                crc32c_partial = crc32c_partial_sse42_clmul;
                compute_crc32c_combine = &crc32c_combine_clmul;
              }
            #endif
            } else {
              crc32c_partial = &crc32c_partial_four_tables;
            }
          #else
            crc32c_partial = &crc32c_partial_four_tables;
          #endif
          }'''
              )
              return s

          patch_text("common/server-functions.c", patch_server_functions)
          patch_text("mtproto/mtproto-proxy.c", patch_mtproto_banner)
          patch_text("engine/engine.c", patch_engine_banner)
          patch_text("engine/engine-rpc.h", patch_engine_rpc_h)
          patch_text("common/precise-time.h", patch_precise_time_h)
          patch_text("common/server-functions.h", patch_server_functions_h)
          patch_text("jobs/jobs.h", patch_jobs_h)
          patch_text("jobs/jobs.c", patch_jobs_c)
          patch_text("common/cpuid.c", patch_cpuid_c)
          patch_text("common/crc32.c", patch_crc32)
          patch_text("common/crc32c.c", patch_crc32c)
          PY

      - name: Build MTProxy (static musl)
        shell: bash
        run: |
          set -euxo pipefail

          make clean || true

          export HOST_ARCH=aarch64
          export CC="zig cc -target ${TARGET_TRIPLE}"
          export CXX="zig c++ -target ${TARGET_TRIPLE}"
          export AR="zig ar"
          export RANLIB="zig ranlib"

          export CFLAGS="-O2 -pipe -static \
            -I${GITHUB_WORKSPACE}/deps/include \
            -fno-strict-aliasing -fwrapv \
            -DAES=1 -D_GNU_SOURCE=1 -D_FILE_OFFSET_BITS=64 \
            -Wno-array-bounds -Wno-implicit-function-declaration"

          export LDFLAGS="-static \
            -L${GITHUB_WORKSPACE}/deps/lib \
            -L${GITHUB_WORKSPACE}/deps/lib64 \
            -Wl,--start-group -lcrypto -lz -lpthread -lm -lrt -Wl,--end-group"

          echo "HOST_ARCH=${HOST_ARCH}"
          echo "CC=${CC}"
          echo "CFLAGS=${CFLAGS}"
          echo "LDFLAGS=${LDFLAGS}"

          make V=1 2>&1 | tee build.log

      - name: Inspect binary
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          ls -lah objs/bin || true
          file objs/bin/mtproto-proxy || true
          readelf -h objs/bin/mtproto-proxy || true
          readelf -d objs/bin/mtproto-proxy || true
          strings objs/bin/mtproto-proxy | grep -Ei 'musl|glibc|openssl|zlib' | head -n 50 || true

      - name: Smoke test under qemu
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          qemu-aarch64 ./objs/bin/mtproto-proxy --help | head -n 60 || true

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-aarch64-musl
          path: objs/bin/mtproto-proxy
